<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Peppa & George's Star Collector</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: stretch;
            height: 100vh;
            font-family: 'Comic Sans MS', 'Arial', sans-serif;
            overflow: hidden;
            flex-direction: column;
        }
        #game-container {
            flex: 1;
            min-height: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        canvas {
            background-color: #E0F7FA;
            border: 4px solid #FFB6C1;
            border-radius: 12px;
            box-shadow: 0px 6px 20px rgba(0,0,0,0.3);
            max-width: 100%;
            max-height: 100%;
            box-sizing: border-box;
            width: auto;
            height: auto;
        }
        #instructions {
            background: rgba(255, 255, 255, 0.8);
            padding: 4px 12px;
            border-radius: 8px;
            margin: 4px 8px;
            text-align: center;
            color: #333;
            font-size: 12px;
            font-weight: bold;
            box-shadow: 0px 2px 6px rgba(0,0,0,0.1);
            flex-shrink: 0;
        }
        .p1-color { color: #E91E63; }
        .p2-color { color: #2196F3; }
        /* Touch controls */
        #controls {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 6px 12px calc(8px + env(safe-area-inset-bottom, 0px));
            background: rgba(0,0,0,0.2);
            flex-shrink: 0;
            gap: 8px;
        }
        .player-controls {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .player-label {
            font-size: 11px;
            font-weight: bold;
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
            white-space: nowrap;
        }
        .p1-label { color: #FFB6C1; }
        .p2-label { color: #9BBBF0; }
        .dpad {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .dpad-row {
            display: flex;
            gap: 2px;
        }
        .dpad-btn {
            width: 46px;
            height: 46px;
            border: none;
            border-radius: 8px;
            font-size: 20px;
            background: rgba(255,255,255,0.85);
            color: #333;
            cursor: pointer;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.35);
        }
        .dpad-btn:active, .dpad-btn.pressed {
            background: rgba(180,180,180,0.95);
        }
        .dpad-center {
            background: transparent !important;
            box-shadow: none !important;
            pointer-events: none;
        }
    </style>
</head>

    <div id="instructions">
        <span class="p1-color">🐷 Peppa (P1): Arrow Keys</span> &nbsp;|&nbsp; 
        <span class="p2-color">🐽 George (P2): WASD Keys</span>
    </div>
    
    <div id="game-container">

    </div>

                </div>
                <div class="dpad-row">
                    <button class="dpad-btn" data-action="p1Left">◀</button>
                    <div class="dpad-btn dpad-center"></div>
                    <button class="dpad-btn" data-action="p1Right">▶</button>
                </div>
                <div class="dpad-row">
                    <button class="dpad-btn" data-action="p1Down">▼</button>
                </div>
            </div>
        </div>
        <div class="player-controls">
            <div class="player-label p2-label">🐽 George (P2)</div>
            <div class="dpad">
                <div class="dpad-row">
                    <button class="dpad-btn" data-action="p2Up" aria-label="George up">▲</button>

                    <div class="dpad-btn dpad-center"></div>

                </div>
                <div class="dpad-row">

        const levelsConfig = getLevels();

        function loadLevel(index) {
            if (index >= levelsConfig.length) {
                gameWon = true;
                return;
            }
            let levelData = levelsConfig[index];
            platforms = levelData.platforms;
            stairs = levelData.stairs;
            stars = levelData.stars;
            jetpack = levelData.jetpack ? { x: levelData.jetpack.x, y: levelData.jetpack.y, collected: false } : null;
            totalStarsInLevel = stars.length;
            score = 0;
            canvas.style.backgroundColor = levelData.bgColor;

            // Reset Players
            peppa.x = levelData.startP1.x;
            peppa.y = levelData.startP1.y;
            peppa.dx = 0; peppa.dy = 0;
            peppa.hasJetpack = false;
            peppa.jetpackActive = false;

            george.x = levelData.startP2.x;
            george.y = levelData.startP2.y;
            george.dx = 0; george.dy = 0;
            george.hasJetpack = false;
            george.jetpackActive = false;
        }

        let animFrame = 0;

        // Peppa Pig - proper cartoon style (matching peppa_pig.html)
        function drawPeppa(x, y) {
            ctx.save();

            // Jetpack on back
            if (peppa.hasJetpack) {
                ctx.fillStyle = '#888';
                ctx.fillRect(x - 2, y + 14, 8, 18);
                ctx.fillStyle = '#AAA';
                ctx.fillRect(x - 1, y + 15, 6, 16);
                if (peppa.jetpackActive) {
                    let flicker = Math.sin(animFrame * 0.5) * 3;
                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.moveTo(x - 1, y + 32);
                    ctx.lineTo(x + 5, y + 32);
                    ctx.lineTo(x + 2, y + 40 + flicker);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // Ears (tall, pointy like the show)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.ellipse(x + 11, y - 4, 3, 7, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 23, y - 4, 3, 7, 0.2, 0, Math.PI * 2);
            ctx.fill();
            // Inner ears
            ctx.fillStyle = '#FFD4E5';
            ctx.beginPath();
            ctx.ellipse(x + 11, y - 4, 1.5, 4, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 23, y - 4, 1.5, 4, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Head (round face)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.arc(x + 17, y + 10, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#E0829B';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Snout (forward facing circle)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.ellipse(x + 30, y + 12, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#E0829B';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Nostrils
            ctx.fillStyle = '#E0829B';
            ctx.beginPath();
            ctx.ellipse(x + 29, y + 11, 2, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 33, y + 11, 2, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes (white with black pupil)
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 13, y + 6, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 23, y + 6, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 14, y + 6, 1.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 24, y + 6, 1.8, 0, Math.PI * 2);
            ctx.fill();
            // Shine
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 14.5, y + 5, 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 24.5, y + 5, 0.7, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (smile)
            ctx.strokeStyle = '#C0607A';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(x + 20, y + 14, 5, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Cheek blush
            ctx.fillStyle = 'rgba(255,150,150,0.35)';
            ctx.beginPath();
            ctx.ellipse(x + 9, y + 14, 4, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // RED DRESS body
            ctx.fillStyle = '#E53935';
            ctx.beginPath();
            ctx.moveTo(x + 7, y + 22);
            ctx.lineTo(x + 27, y + 22);
            ctx.lineTo(x + 30, y + 42);
            ctx.lineTo(x + 4, y + 42);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#B71C1C';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Arms
            ctx.fillStyle = '#FFAEC9';
            ctx.fillRect(x + 2, y + 24, 6, 4);
            ctx.fillRect(x + 26, y + 24, 6, 4);

            // Legs (skin)
            ctx.fillStyle = '#FFAEC9';
            ctx.fillRect(x + 10, y + 42, 5, 6);
            ctx.fillRect(x + 19, y + 42, 5, 6);

            // Black shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 9, y + 47, 7, 4);
            ctx.fillRect(x + 18, y + 47, 7, 4);

            // Curly tail
            ctx.strokeStyle = '#FFAEC9';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 1, y + 32, 4, -Math.PI * 0.5, Math.PI * 1.2);
            ctx.stroke();

            ctx.restore();
        }

        // George Pig - smaller, blue outfit
        function drawGeorge(x, y) {
            ctx.save();

            // Jetpack on back
            if (george.hasJetpack) {
                ctx.fillStyle = '#888';
                ctx.fillRect(x - 2, y + 12, 7, 15);
                ctx.fillStyle = '#AAA';
                ctx.fillRect(x - 1, y + 13, 5, 13);
                if (george.jetpackActive) {
                    let flicker = Math.sin(animFrame * 0.5) * 3;
                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.moveTo(x - 1, y + 27);
                    ctx.lineTo(x + 4, y + 27);
                    ctx.lineTo(x + 1.5, y + 34 + flicker);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // Ears
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.ellipse(x + 9, y - 3, 2.5, 6, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 20, y - 3, 2.5, 6, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#C5D9F7';
            ctx.beginPath();
            ctx.ellipse(x + 9, y - 3, 1.2, 3.5, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 20, y - 3, 1.2, 3.5, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.arc(x + 15, y + 9, 11, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#7A9AD6';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Snout
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.ellipse(x + 26, y + 11, 6.5, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#7A9AD6';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Nostrils
            ctx.fillStyle = '#7A9AD6';
            ctx.beginPath();
            ctx.ellipse(x + 25, y + 10, 1.5, 1.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 28.5, y + 10, 1.5, 1.2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 11, y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 20, y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 12, y + 5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 21, y + 5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 12.4, y + 4.2, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 21.4, y + 4.2, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Mouth
            ctx.strokeStyle = '#6080B8';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x + 17, y + 13, 4, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Cheek blush
            ctx.fillStyle = 'rgba(150,170,255,0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 7, y + 13, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // BLUE body/outfit
            ctx.fillStyle = '#1565C0';
            ctx.beginPath();
            ctx.moveTo(x + 6, y + 19);
            ctx.lineTo(x + 24, y + 19);
            ctx.lineTo(x + 26, y + 36);
            ctx.lineTo(x + 4, y + 36);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#0D47A1';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Arms
            ctx.fillStyle = '#9BBBF0';
            ctx.fillRect(x + 1, y + 21, 5, 3.5);
            ctx.fillRect(x + 24, y + 21, 5, 3.5);

            // Legs (skin)
            ctx.fillStyle = '#9BBBF0';
            ctx.fillRect(x + 9, y + 36, 4, 5);
            ctx.fillRect(x + 17, y + 36, 4, 5);

            // Black shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 8, y + 40, 6, 3);
            ctx.fillRect(x + 16, y + 40, 6, 3);

            // Curly tail
            ctx.strokeStyle = '#9BBBF0';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.arc(x + 1, y + 28, 3, -Math.PI * 0.5, Math.PI * 1.2);
            ctx.stroke();

            ctx.restore();
        }

        // Event Listeners for Controls
        window.addEventListener("keydown", (e) => {
            // Player 1 - Peppa (Arrow Keys)
            if (e.code === "ArrowRight") keys.p1.right = true;
            if (e.code === "ArrowLeft") keys.p1.left = true;
            if (e.code === "ArrowUp") keys.p1.up = true;
            if (e.code === "ArrowDown") keys.p1.down = true;

            // Player 2 - George (WASD)
            if (e.code === "KeyD") keys.p2.right = true;
            if (e.code === "KeyA") keys.p2.left = true;
            if (e.code === "KeyW") keys.p2.up = true;
            if (e.code === "KeyS") keys.p2.down = true;
        });

        window.addEventListener("keyup", (e) => {
            if (e.code === "ArrowRight") keys.p1.right = false;
            if (e.code === "ArrowLeft") keys.p1.left = false;
            if (e.code === "ArrowUp") keys.p1.up = false;
            if (e.code === "ArrowDown") keys.p1.down = false;

            if (e.code === "KeyD") keys.p2.right = false;
            if (e.code === "KeyA") keys.p2.left = false;
            if (e.code === "KeyW") keys.p2.up = false;
            if (e.code === "KeyS") keys.p2.down = false;
        });

        // Touch controls
        (function setupTouchControls() {
            const press = {
                p1Up:    () => { keys.p1.up    = true;  },
                p1Down:  () => { keys.p1.down  = true;  },
                p1Left:  () => { keys.p1.left  = true;  },
                p1Right: () => { keys.p1.right = true;  },
                p2Up:    () => { keys.p2.up    = true;  },
                p2Down:  () => { keys.p2.down  = true;  },
                p2Left:  () => { keys.p2.left  = true;  },
                p2Right: () => { keys.p2.right = true;  }
            };
            const release = {
                p1Up:    () => { keys.p1.up    = false; },
                p1Down:  () => { keys.p1.down  = false; },
                p1Left:  () => { keys.p1.left  = false; },
                p1Right: () => { keys.p1.right = false; },
                p2Up:    () => { keys.p2.up    = false; },
                p2Down:  () => { keys.p2.down  = false; },
                p2Left:  () => { keys.p2.left  = false; },
                p2Right: () => { keys.p2.right = false; }
            };
            document.querySelectorAll('.dpad-btn[data-action]').forEach(btn => {
                const action = btn.dataset.action;
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    btn.classList.add('pressed');
                    if (press[action]) press[action]();
                }, { passive: false });
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault();
                    btn.classList.remove('pressed');
                    if (release[action]) release[action]();
                }, { passive: false });
                btn.addEventListener('touchcancel', () => {
                    btn.classList.remove('pressed');
                    if (release[action]) release[action]();
                });
                // Also support mouse for desktop testing
                btn.addEventListener('mousedown', () => { btn.classList.add('pressed'); if (press[action]) press[action](); });
                btn.addEventListener('mouseup',   () => { btn.classList.remove('pressed'); if (release[action]) release[action](); });
                btn.addEventListener('mouseleave', () => { btn.classList.remove('pressed'); if (release[action]) release[action](); });
            });
        })();

        function updatePlayer(player, input) {
            // Horizontal Movement
            if (input.right) player.dx += 1.5;
            if (input.left) player.dx -= 1.5;
            player.dx *= friction; 
            player.x += player.dx;

            // Screen boundaries
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Check if overlapping any stair zone (full body overlap)
            let inStairZone = false;
            for (let s of stairs) {
                let inX = player.x + player.width > s.x && player.x < s.x + s.w;
                let inY = player.y + player.height > s.y && player.y < s.y + s.h;
                if (inX && inY) {
                    inStairZone = true;
                    break;
                }
            }

            // Jetpack flight
            if (player.hasJetpack && player.jetpackActive) {
                if (input.up) player.dy = -5;
                else if (input.down) player.dy = 3;
                else player.dy *= 0.85;
            } else if (inStairZone) {
                if (input.up) {
                    player.dy = -4;
                    player.onStairs = true;
                } else if (input.down) {
                    player.dy = 4;
                    player.onStairs = true;
                } else {
                    if (player.onStairs) player.dy = 0;
                }
            } else {
                player.onStairs = false;
                player.dy += gravity;
            }
            
            player.y += player.dy;

            // Platform Collision Logic
            for (let plat of platforms) {
                if (
                    player.dy > 0 && 
                    player.y + player.height >= plat.y && 
                    player.y + player.height <= plat.y + player.dy + 1 && 
                    player.x + player.width > plat.x && 
                    player.x < plat.x + plat.w
                ) {
                    player.y = plat.y - player.height;
                    player.dy = 0;
                    player.onStairs = false;
                }
            }
        }

        function update() {
            if (gameWon) return;
            animFrame++;

            updatePlayer(peppa, keys.p1);
            updatePlayer(george, keys.p2);

            // Jetpack pickup collision
            if (jetpack && !jetpack.collected) {
                [peppa, george].forEach(player => {
                    if (player.x < jetpack.x + 25 && player.x + player.width > jetpack.x &&
                        player.y < jetpack.y + 30 && player.y + player.height > jetpack.y) {
                        jetpack.collected = true;
                        player.hasJetpack = true;
                        player.jetpackActive = true;
                    }
                });
            }

            // Shared Star Collision Logic
            for (let star of stars) {
                if (!star.collected) {
                    // Check Peppa
                    let peppaHit = (peppa.x < star.x + 30 && peppa.x + peppa.width > star.x && peppa.y < star.y + 30 && peppa.y + peppa.height > star.y);
                    // Check George
                    let georgeHit = (george.x < star.x + 30 && george.x + george.width > star.x && george.y < star.y + 30 && george.y + george.height > star.y);
                    
                    if (peppaHit || georgeHit) {
                        star.collected = true;
                        score++;
                    }
                }
            }

            // Level Progression
            if (score >= totalStarsInLevel) {
                currentLevelIndex++;
                loadLevel(currentLevelIndex);
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Stairs
            for (let s of stairs) {
                ctx.fillStyle = s.color;
                ctx.fillRect(s.x, s.y, s.w, s.h);
                // Draw stair steps
                ctx.fillStyle = 'rgba(0,0,0,0.15)';
                for (let i = s.y; i < s.y + s.h; i += 20) {
                    ctx.fillRect(s.x, i, s.w, 4);
                }
            }

            // Draw Platforms
            for (let plat of platforms) {
                ctx.fillStyle = plat.color;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
            }

            // Draw Stars
            ctx.font = "30px Arial";
            for (let star of stars) {
                if (!star.collected) {
                    ctx.fillText("⭐", star.x, star.y + 25);
                }
            }

            // Draw Jetpack pickup
            if (jetpack && !jetpack.collected) {
                let bob = Math.sin(animFrame * 0.08) * 3;
                let glow = 0.5 + Math.sin(animFrame * 0.1) * 0.3;
                ctx.fillStyle = `rgba(255, 215, 0, ${glow * 0.3})`;
                ctx.beginPath();
                ctx.arc(jetpack.x + 12, jetpack.y + 15 + bob, 18, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#888';
                ctx.beginPath();
                ctx.roundRect(jetpack.x + 2, jetpack.y + 4 + bob, 20, 24, 4);
                ctx.fill();
                ctx.fillStyle = '#AAA';
                ctx.beginPath();
                ctx.roundRect(jetpack.x + 4, jetpack.y + 6 + bob, 16, 20, 3);
                ctx.fill();
                ctx.fillStyle = '#E53935';
                ctx.beginPath();
                ctx.roundRect(jetpack.x, jetpack.y + 18 + bob, 7, 12, 3);
                ctx.fill();
                ctx.beginPath();
                ctx.roundRect(jetpack.x + 17, jetpack.y + 18 + bob, 7, 12, 3);
                ctx.fill();
                ctx.fillStyle = '#FF6D00';
                ctx.beginPath();
                ctx.moveTo(jetpack.x + 1, jetpack.y + 30 + bob);
                ctx.lineTo(jetpack.x + 6, jetpack.y + 30 + bob);
                ctx.lineTo(jetpack.x + 3.5, jetpack.y + 36 + bob + Math.sin(animFrame * 0.3) * 2);
                ctx.closePath();
                ctx.fill();
                ctx.beginPath();
                ctx.moveTo(jetpack.x + 18, jetpack.y + 30 + bob);
                ctx.lineTo(jetpack.x + 23, jetpack.y + 30 + bob);
                ctx.lineTo(jetpack.x + 20.5, jetpack.y + 36 + bob + Math.sin(animFrame * 0.3 + 1) * 2);
                ctx.closePath();
                ctx.fill();
                ctx.fillStyle = '#FFD700';
                ctx.font = 'bold 9px Comic Sans MS';
                ctx.textAlign = 'center';
                ctx.fillText('JET', jetpack.x + 12, jetpack.y + 2 + bob);
                ctx.textAlign = 'left';
            }

            // Draw Players (cartoon style)
            drawPeppa(peppa.x, peppa.y);
            drawGeorge(george.x, george.y);

            // Draw HUD
            ctx.fillStyle = "#E91E63";
            ctx.font = "bold 24px Comic Sans MS";
            ctx.fillText(`World: ${currentLevelIndex + 1} | Stars: ${score} / ${totalStarsInLevel}`, 20, 40);

            // Win message
            if (gameWon) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.7)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FFEB3B";
                ctx.font = "bold 60px Comic Sans MS";
                ctx.textAlign = "center";
                ctx.fillText("You Won the Game! 🎉", canvas.width / 2, canvas.height / 2);
                ctx.font = "30px Comic Sans MS";
                ctx.fillStyle = "white";
                ctx.fillText("Peppa and George collected all the stars!", canvas.width / 2, canvas.height / 2 + 50);
            }
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        // Initialize first level and start loop
        loadLevel(0);
        gameLoop();
    </script>
</body>
</html>
