        // Peppa Pig - proper cartoon style
        function drawPeppa(x, y) {
            const p = peppa;
            ctx.save();

            // Jetpack on back
            if (p.hasJetpack) {
                ctx.fillStyle = '#888';
                ctx.fillRect(x - 2, y + 14, 8, 18);
                ctx.fillStyle = '#AAA';
                ctx.fillRect(x - 1, y + 15, 6, 16);
                if (p.jetpackActive) {
                    let flicker = Math.sin(animFrame * 0.5) * 3;
                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.moveTo(x - 1, y + 32);
                    ctx.lineTo(x + 5, y + 32);
                    ctx.lineTo(x + 2, y + 40 + flicker);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.moveTo(x, y + 32);
                    ctx.lineTo(x + 4, y + 32);
                    ctx.lineTo(x + 2, y + 36 + flicker * 0.5);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // Ears (tall, pointy like the show)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.ellipse(x + 11, y - 4, 3, 7, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 23, y - 4, 3, 7, 0.2, 0, Math.PI * 2);
            ctx.fill();
            // Inner ears
            ctx.fillStyle = '#FFD4E5';
            ctx.beginPath();
            ctx.ellipse(x + 11, y - 4, 1.5, 4, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 23, y - 4, 1.5, 4, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Head (round face)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.arc(x + 17, y + 10, 13, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#E0829B';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Snout (forward facing circle)
            ctx.fillStyle = '#FFAEC9';
            ctx.beginPath();
            ctx.ellipse(x + 30, y + 12, 8, 7, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#E0829B';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Nostrils
            ctx.fillStyle = '#E0829B';
            ctx.beginPath();
            ctx.ellipse(x + 29, y + 11, 2, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 33, y + 11, 2, 1.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes (white with black pupil)
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 13, y + 6, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 23, y + 6, 3.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 14, y + 6, 1.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 24, y + 6, 1.8, 0, Math.PI * 2);
            ctx.fill();
            // Shine
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 14.5, y + 5, 0.7, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 24.5, y + 5, 0.7, 0, Math.PI * 2);
            ctx.fill();

            // Mouth (smile)
            ctx.strokeStyle = '#C0607A';
            ctx.lineWidth = 1.2;
            ctx.beginPath();
            ctx.arc(x + 20, y + 14, 5, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Cheek blush
            ctx.fillStyle = 'rgba(255,150,150,0.35)';
            ctx.beginPath();
            ctx.ellipse(x + 9, y + 14, 4, 2.5, 0, 0, Math.PI * 2);
            ctx.fill();

            // RED DRESS body
            ctx.fillStyle = '#E53935';
            ctx.beginPath();
            ctx.moveTo(x + 7, y + 22);
            ctx.lineTo(x + 27, y + 22);
            ctx.lineTo(x + 30, y + 42);
            ctx.lineTo(x + 4, y + 42);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#B71C1C';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Arms
            ctx.fillStyle = '#FFAEC9';
            ctx.fillRect(x + 2, y + 24, 6, 4);
            ctx.fillRect(x + 26, y + 24, 6, 4);

            // Legs (skin)
            ctx.fillStyle = '#FFAEC9';
            ctx.fillRect(x + 10, y + 42, 5, 6);
            ctx.fillRect(x + 19, y + 42, 5, 6);

            // Black shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 9, y + 47, 7, 4);
            ctx.fillRect(x + 18, y + 47, 7, 4);

            // Curly tail
            ctx.strokeStyle = '#FFAEC9';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(x + 1, y + 32, 4, -Math.PI * 0.5, Math.PI * 1.2);
            ctx.stroke();

            ctx.restore();
        }

        // George Pig - smaller, blue outfit, dinosaur-lover

                    ctx.fillStyle = '#FF4500';
                    ctx.beginPath();
                    ctx.moveTo(x - 1, y + 27);
                    ctx.lineTo(x + 4, y + 27);
                    ctx.lineTo(x + 1.5, y + 34 + flicker);
                    ctx.closePath();
                    ctx.fill();
                    ctx.fillStyle = '#FFD700';
                    ctx.beginPath();
                    ctx.moveTo(x, y + 27);
                    ctx.lineTo(x + 3, y + 27);
                    ctx.lineTo(x + 1.5, y + 31 + flicker * 0.5);
                    ctx.closePath();
                    ctx.fill();
                }
            }

            // Ears
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.ellipse(x + 9, y - 3, 2.5, 6, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 20, y - 3, 2.5, 6, 0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#C5D9F7';
            ctx.beginPath();
            ctx.ellipse(x + 9, y - 3, 1.2, 3.5, -0.2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 20, y - 3, 1.2, 3.5, 0.2, 0, Math.PI * 2);
            ctx.fill();

            // Head
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.arc(x + 15, y + 9, 11, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#7A9AD6';
            ctx.lineWidth = 1.2;
            ctx.stroke();

            // Snout
            ctx.fillStyle = '#9BBBF0';
            ctx.beginPath();
            ctx.ellipse(x + 26, y + 11, 6.5, 5.5, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#7A9AD6';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Nostrils
            ctx.fillStyle = '#7A9AD6';
            ctx.beginPath();
            ctx.ellipse(x + 25, y + 10, 1.5, 1.2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x + 28.5, y + 10, 1.5, 1.2, 0, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 11, y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 20, y + 5, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(x + 12, y + 5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 21, y + 5, 1.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#FFF';
            ctx.beginPath();
            ctx.arc(x + 12.4, y + 4.2, 0.5, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + 21.4, y + 4.2, 0.5, 0, Math.PI * 2);
            ctx.fill();

            // Mouth
            ctx.strokeStyle = '#6080B8';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.arc(x + 17, y + 13, 4, 0.1, Math.PI - 0.1);
            ctx.stroke();

            // Cheek blush
            ctx.fillStyle = 'rgba(150,170,255,0.3)';
            ctx.beginPath();
            ctx.ellipse(x + 7, y + 13, 3, 2, 0, 0, Math.PI * 2);
            ctx.fill();

            // BLUE body/outfit
            ctx.fillStyle = '#1565C0';
            ctx.beginPath();
            ctx.moveTo(x + 6, y + 19);
            ctx.lineTo(x + 24, y + 19);
            ctx.lineTo(x + 26, y + 36);
            ctx.lineTo(x + 4, y + 36);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = '#0D47A1';
            ctx.lineWidth = 1;
            ctx.stroke();

            // Arms
            ctx.fillStyle = '#9BBBF0';
            ctx.fillRect(x + 1, y + 21, 5, 3.5);
            ctx.fillRect(x + 24, y + 21, 5, 3.5);

            // Legs (skin)
            ctx.fillStyle = '#9BBBF0';
            ctx.fillRect(x + 9, y + 36, 4, 5);
            ctx.fillRect(x + 17, y + 36, 4, 5);

            // Black shoes
            ctx.fillStyle = '#222';
            ctx.fillRect(x + 8, y + 40, 6, 3);
            ctx.fillRect(x + 16, y + 40, 6, 3);

            // Curly tail
            ctx.strokeStyle = '#9BBBF0';
            ctx.lineWidth = 1.8;
            ctx.beginPath();
            ctx.arc(x + 1, y + 28, 3, -Math.PI * 0.5, Math.PI * 1.2);
            ctx.stroke();

            ctx.restore();
        }

        function drawJetpack(x, y) {
            // Bigger, more visible jetpack pickup
            let bob = Math.sin(animFrame * 0.08) * 3;
            let glow = 0.5 + Math.sin(animFrame * 0.1) * 0.3;

            // Glow
            ctx.fillStyle = `rgba(255, 215, 0, ${glow * 0.3})`;
            ctx.beginPath();
            ctx.arc(x + 15, y + 15 + bob, 20, 0, Math.PI * 2);
            ctx.fill();

            // Tank body
            ctx.fillStyle = '#888';
            ctx.beginPath();
            ctx.roundRect(x + 4, y + 4 + bob, 22, 26, 4);
            ctx.fill();
            ctx.fillStyle = '#AAA';
            ctx.beginPath();
            ctx.roundRect(x + 6, y + 6 + bob, 18, 22, 3);
            ctx.fill();

            // Rockets
            ctx.fillStyle = '#E53935';
            ctx.beginPath();
            ctx.roundRect(x + 2, y + 18 + bob, 8, 14, 3);
            ctx.fill();
            ctx.beginPath();
            ctx.roundRect(x + 20, y + 18 + bob, 8, 14, 3);
            ctx.fill();

            // Flames
            ctx.fillStyle = '#FF6D00';
            ctx.beginPath();
            ctx.moveTo(x + 3, y + 32 + bob);
            ctx.lineTo(x + 9, y + 32 + bob);
            ctx.lineTo(x + 6, y + 38 + bob + Math.sin(animFrame * 0.3) * 2);
            ctx.closePath();
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(x + 21, y + 32 + bob);
            ctx.lineTo(x + 27, y + 32 + bob);
            ctx.lineTo(x + 24, y + 38 + bob + Math.sin(animFrame * 0.3 + 1) * 2);
            ctx.closePath();
            ctx.fill();

            // Label
            ctx.fillStyle = '#FFD700';
            ctx.font = 'bold 10px Comic Sans MS';
            ctx.textAlign = 'center';
            ctx.fillText('JET', x + 15, y + 1 + bob);
            ctx.textAlign = 'left';
        }

        function drawSpike(x, y, w, h) {
            ctx.fillStyle = '#CC0000';
            ctx.beginPath();
            ctx.moveTo(x, y + h);
            ctx.lineTo(x + w / 2, y);
            ctx.lineTo(x + w, y + h);
            ctx.closePath();
            ctx.fill();
        }

        function updatePlayer(player, keysPrefix) {
            const level = levels[currentLevel - 1];
            
            // Horizontal movement
            if (keysPrefix === 'p1') {
                if (keys.p1Right) player.dx += 1;
                if (keys.p1Left) player.dx -= 1;
            } else {
                if (keys.p2Right) player.dx += 1;
                if (keys.p2Left) player.dx -= 1;
            }
            player.dx *= friction;
            player.x += player.dx;

            if (player.x < 0) player.x = 0;
            if (player.x + player.width > canvas.width) player.x = canvas.width - player.width;

            // Determine which keys to use
            let kUp = keysPrefix === 'p1' ? keys.p1Up : keys.p2Up;
            let kDown = keysPrefix === 'p1' ? keys.p1Down : keys.p2Down;

            // Jetpack flight
            if (player.hasJetpack && player.jetpackActive) {
                if (kUp) player.dy = -5;
                else if (kDown) player.dy = 3;
                else player.dy *= 0.85; // hover / slow drift
            } else {
                // Check if overlapping any stair zone
                let onAnyStair = false;
                for (let stair of level.stairs) {
                    let inStairX = player.x + player.width > stair.x && player.x < stair.x + stair.w;
                    let inStairY = player.y + player.height > stair.y && player.y < stair.y + stair.h;
                    if (inStairX && inStairY) {
                        onAnyStair = true;
                        if (kUp) { player.dy = -4; player.onStairs = true; }
                        else if (kDown) { player.dy = 4; player.onStairs = true; }
                        else if (player.onStairs) { player.dy = 0; }
                        break;
                    }
                }

                if (!onAnyStair) player.onStairs = false;

                if (!player.onStairs) {
                    player.dy += gravity;
                }
            }
            player.y += player.dy;

            // Platform collision
            for (let plat of level.platforms) {
                if (player.dy > 0 && player.y + player.height >= plat.y && 
                    player.y + player.height <= plat.y + player.dy + 5 && 
                    player.x + player.width > plat.x && player.x < plat.x + plat.w) {
                    player.y = plat.y - player.height;
                    player.dy = 0;
                    player.onStairs = false;
                }
            }

            // Spike collision
            for (let spike of level.spikes) {
                if (player.x < spike.x + spike.w && player.x + player.width > spike.x &&
                    player.y < spike.y + spike.h && player.y + player.height > spike.y) {
                    player.x = 50;
                    player.y = 480;
                    player.dx = 0;
                    player.dy = 0;
                    player.hasJetpack = false;
                    player.jetpackActive = false;
                }
            }
        }

        function checkStarCollision(player) {
            const level = levels[currentLevel - 1];
            for (let star of level.stars) {
                if (!star.collected && player.x < star.x + 25 && player.x + player.width > star.x &&
                    player.y < star.y + 25 && player.y + player.height > star.y) {
                    star.collected = true;
                }
            }
        }

        function checkJetpackCollision(player) {
            const level = levels[currentLevel - 1];
            if (!level.jetpack || level.jetpack.collected) return;
            
            if (player.x < level.jetpack.x + 20 && player.x + player.width > level.jetpack.x &&
                player.y < level.jetpack.y + 20 && player.y + player.height > level.jetpack.y) {
                level.jetpack.collected = true;
                player.hasJetpack = true;
                player.jetpackActive = true;
                updateJetpackDisplay();
            }
        }

        function updateJetpackDisplay() {
            const hasJet = peppa.hasJetpack || george.hasJetpack;
            const active = peppa.jetpackActive || george.jetpackActive;
            document.getElementById('jetpack').textContent = hasJet ? (active ? 'Jetpack: ACTIVE!' : 'Jetpack: Ready') : 'Jetpack: OFF';
            document.getElementById('jetpack').style.color = active ? '#FF6347' : '#FFD700';
        }

        function update() {
            if (gameWon || levelWon) return;
            animFrame++;
            
            updatePlayer(peppa, 'p1');
            updatePlayer(george, 'p2');
            checkStarCollision(peppa);
            checkStarCollision(george);
            checkJetpackCollision(peppa);
            checkJetpackCollision(george);

            const level = levels[currentLevel - 1];
            let allCollected = level.stars.every(s => s.collected);
            if (allCollected) levelWon = true;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const level = levels[currentLevel - 1];

            // Draw platforms
            for (let plat of level.platforms) {
                ctx.fillStyle = plat.color;
                ctx.fillRect(plat.x, plat.y, plat.w, plat.h);
                ctx.strokeStyle = '#333';
                ctx.lineWidth = 2;
                ctx.strokeRect(plat.x, plat.y, plat.w, plat.h);
            }

            // Draw stairs
            for (let stair of level.stairs) {
                ctx.fillStyle = stair.color;
                ctx.fillRect(stair.x, stair.y, stair.w, stair.h);
                ctx.fillStyle = '#BCAAA4';
                for (let i = stair.y; i < stair.y + stair.h; i += 20) {
                    ctx.fillRect(stair.x, i, stair.w, 4);
                }
            }

            // Draw spikes
            for (let spike of level.spikes) {
                drawSpike(spike.x, spike.y, spike.w, spike.h);
            }

            // Draw jetpack if available
            if (level.jetpack && !level.jetpack.collected) {
                drawJetpack(level.jetpack.x, level.jetpack.y);
            }

            // Draw stars
            for (let star of level.stars) {
                if (!star.collected) {
                    ctx.font = "22px Arial";
                    ctx.fillText("⭐", star.x, star.y + 18);
                }
            }

            // Draw players
            drawPeppa(peppa.x, peppa.y);
            drawGeorge(george.x, george.y);

            // Draw HUD
            ctx.fillStyle = "#E91E63";
            ctx.font = "bold 18px Comic Sans MS";
            const starsCollected = level.stars.filter(s => s.collected).length;
            ctx.fillText(`Stars: ${starsCollected} / ${level.stars.length}`, 20, 40);

            // Draw level complete message
            if (levelWon && !gameWon) {
                ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#FFEB3B";
                ctx.font = "bold 45px Comic Sans MS";
                ctx.textAlign = "center";
                ctx.fillText("Level " + currentLevel + " Complete! 🎉", canvas.width / 2, canvas.height / 2 - 50);
                ctx.font = "22px Comic Sans MS";
                ctx.fillStyle = "white";
                if (currentLevel < levels.length) {
                    ctx.fillText("Get ready for Level " + (currentLevel + 1) + "!", canvas.width / 2, canvas.height / 2 + 20);
                } else {
                    ctx.fillStyle = "#FFEB3B";
                    ctx.font = "bold 32px Comic Sans MS";
                    ctx.fillText("YOU'VE COMPLETED ALL LEVELS! 🌟", canvas.width / 2, canvas.height / 2 + 50);
                    gameWon = true;
                }
                ctx.textAlign = "left";
            }
        }

        function gameLoop() {
            update();
            draw();

            if (levelWon && !gameWon) {
                if (!nextLevelReady) {
                    nextLevelReady = true;
                    setTimeout(() => {
                        if (currentLevel < levels.length) {
                            currentLevel++;
                            levelWon = false;
                            nextLevelReady = false;
                            peppa.x = 50;
                            peppa.y = 480;
                            peppa.dx = 0;
                            peppa.dy = 0;
                            peppa.hasJetpack = false;
                            peppa.jetpackActive = false;
                            george.x = 100;
                            george.y = 480;
                            george.dx = 0;
                            george.dy = 0;
                            george.hasJetpack = false;
                            george.jetpackActive = false;
                            updateJetpackDisplay();
                            document.getElementById('level').textContent = currentLevel;
                        } else {
                            gameWon = true;
                        }
                    }, 2500);
                }
            }

            requestAnimationFrame(gameLoop);
        }

        updateJetpackDisplay();
        gameLoop();
    </script>
</body>
</html>
