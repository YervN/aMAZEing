<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<!-- Prevent zoom -->
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

<title>Touch Air Hockey</title>

<style>
body{
margin:0;
overflow:hidden;
background:#081a2a;
touch-action:none;
}

canvas{
display:block;
}

#score{
position:absolute;
top:10px;
width:100%;
text-align:center;
color:white;
font-size:32px;
font-weight:bold;
font-family:sans-serif;
}
</style>
</head>

<body>

<div id="score">0 : 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score1=0;
let score2=0;

const goalWidth = canvas.width * 0.25;

let wallGlow = 0;

const puck = {
x:canvas.width/2,
y:canvas.height/2,
vx:5,
vy:5,
r:24
};

const paddle1={
x:canvas.width/2,
y:canvas.height-120,
r:45
};

const paddle2={
x:canvas.width/2,
y:120,
r:45
};

function resetPuck(){
puck.x=canvas.width/2;
puck.y=canvas.height/2;
puck.vx=(Math.random()>0.5?1:-1)*5;
puck.vy=(Math.random()>0.5?1:-1)*5;
}

function drawCircle(x,y,r,color){
ctx.beginPath();
ctx.arc(x,y,r,0,Math.PI*2);
ctx.fillStyle=color;
ctx.fill();
}

function collide(p){
let dx=puck.x-p.x;
let dy=puck.y-p.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist < puck.r+p.r){

let angle=Math.atan2(dy,dx);
let speed=8;

puck.vx=Math.cos(angle)*speed;
puck.vy=Math.sin(angle)*speed;

}
}

function update(){

puck.x+=puck.vx;
puck.y+=puck.vy;

let leftGoal=(canvas.width-goalWidth)/2;
let rightGoal=(canvas.width+goalWidth)/2;

/* side walls */
if(puck.x<puck.r || puck.x>canvas.width-puck.r){
puck.vx*=-1;
wallGlow=12;
}

/* top wall except goal */
if(puck.y<puck.r){
if(puck.x<leftGoal || puck.x>rightGoal){
puck.vy*=-1;
wallGlow=12;
}else{
score1++;
resetPuck();
}
}

/* bottom wall except goal */
if(puck.y>canvas.height-puck.r){
if(puck.x<leftGoal || puck.x>rightGoal){
puck.vy*=-1;
wallGlow=12;
}else{
score2++;
resetPuck();
}
}

collide(paddle1);
collide(paddle2);

if(wallGlow>0) wallGlow--;

document.getElementById("score").textContent=
score1+" : "+score2;

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

/* middle line */
ctx.strokeStyle="white";
ctx.lineWidth=4;
ctx.beginPath();
ctx.moveTo(0,canvas.height/2);
ctx.lineTo(canvas.width,canvas.height/2);
ctx.stroke();

/* goals */
ctx.fillStyle="#1e3a5f";
ctx.fillRect((canvas.width-goalWidth)/2,0,goalWidth,10);
ctx.fillRect((canvas.width-goalWidth)/2,canvas.height-10,goalWidth,10);

if(wallGlow>0){
ctx.shadowColor="cyan";
ctx.shadowBlur=40;
}

drawCircle(puck.x,puck.y,puck.r,"white");

ctx.shadowBlur=0;

drawCircle(paddle1.x,paddle1.y,paddle1.r,"#4CAF50");
drawCircle(paddle2.x,paddle2.y,paddle2.r,"#FF5252");

}

function loop(){
update();
draw();
requestAnimationFrame(loop);
}

canvas.addEventListener("touchmove",e=>{
e.preventDefault();

for(let t of e.touches){

let rect=canvas.getBoundingClientRect();
let x=t.clientX-rect.left;
let y=t.clientY-rect.top;

if(y>canvas.height/2){
paddle1.x=x;
paddle1.y=y;
}else{
paddle2.x=x;
paddle2.y=y;
}

}

},{passive:false});

loop();

</script>

</body>
</html>
