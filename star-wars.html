<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sci-Fi 2D Shooter</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* Deep space background */
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 24px;
            font-weight: bold;
            pointer-events: none; /* Let clicks pass through to canvas */
        }
        canvas {
            background-color: #0a0a1a;
            border: 2px solid #333;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            cursor: crosshair;
        }
        #gameOver {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid red;
            border-radius: 10px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #fff;
            color: #000;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #ccc; }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="scoreText">0</span></div>
    
    <div id="gameOver">
        <h1 style="color: red;">THE DARK SIDE WINS</h1>
        <h2>Final Score: <span id="finalScore">0</span></h2>
        <button onclick="location.reload()">Restart Game</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Set canvas size
    canvas.width = 800;
    canvas.height = 600;

    let score = 0;
    const scoreText = document.getElementById('scoreText');
    const gameOverScreen = document.getElementById('gameOver');
    const finalScore = document.getElementById('finalScore');

    let animationId;
    let isGameOver = false;

    // --- Game Entities ---

    class Player {
        constructor(x, y, radius, color) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.speed = 5;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
            // Glow effect
            ctx.shadowBlur = 15;
            ctx.shadowColor = this.color;
        }
        update() {
            this.draw();
            // Movement boundaries
            if (keys.w && this.y - this.radius > 0) this.y -= this.speed;
            if (keys.s && this.y + this.radius < canvas.height) this.y += this.speed;
            if (keys.a && this.x - this.radius > 0) this.x -= this.speed;
            if (keys.d && this.x + this.radius < canvas.width) this.x += this.speed;
        }
    }

    class Projectile {
        constructor(x, y, radius, color, velocity) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.velocity = velocity;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
        }
        update() {
            this.draw();
            this.x += this.velocity.x;
            this.y += this.velocity.y;
        }
    }

    class Enemy {
        constructor(x, y, radius, color, velocity) {
            this.x = x;
            this.y = y;
            this.radius = radius;
            this.color = color;
            this.velocity = velocity;
        }
        draw() {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2, false);
            ctx.fillStyle = this.color;
            ctx.fill();
            ctx.shadowBlur = 10;
            ctx.shadowColor = 'red';
        }
        update() {
            this.draw();
            // Enemies slowly move toward player
            const angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.velocity.x = Math.cos(angle) * 1.5;
            this.velocity.y = Math.sin(angle) * 1.5;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
        }
    }

    // --- State and Variables ---

    const player = new Player(canvas.width / 2, canvas.height / 2, 15, '#00ffff');
    const projectiles = [];
    const enemies = [];
    
    const keys = { w: false, a: false, s: false, d: false };

    // --- Input Handling ---

    window.addEventListener('keydown', (e) => {
        if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keys.w = true;
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.a = true;
        if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') keys.s = true;
        if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.d = true;
    });

    window.addEventListener('keyup', (e) => {
        if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp') keys.w = false;
        if (e.key === 'a' || e.key === 'A' || e.key === 'ArrowLeft') keys.a = false;
        if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') keys.s = false;
        if (e.key === 'd' || e.key === 'D' || e.key === 'ArrowRight') keys.d = false;
    });

    canvas.addEventListener('mousedown', (e) => {
        if(isGameOver) return;
        
        const rect = canvas.getBoundingClientRect();
        const mouseX = e.clientX - rect.left;
        const mouseY = e.clientY - rect.top;

        const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
        const velocity = {
            x: Math.cos(angle) * 10,
            y: Math.sin(angle) * 10
        };

        // Create a green "Light Side" laser
        projectiles.push(new Projectile(player.x, player.y, 4, '#00ff00', velocity));
    });

    // --- Game Logic ---

    function spawnEnemies() {
        setInterval(() => {
            if(isGameOver) return;

            const radius = Math.random() * (20 - 10) + 10;
            let x, y;

            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const color = '#ff0000'; // Dark side color
            enemies.push(new Enemy(x, y, radius, color, { x: 0, y: 0 }));
        }, 1000); // Spawns an enemy every 1 second
    }

    function animate() {
        animationId = requestAnimationFrame(animate);
        
        // Clear canvas with a trail effect
        ctx.fillStyle = 'rgba(10, 10, 26, 0.3)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Turn off shadows for text/backgrounds to save performance
        ctx.shadowBlur = 0;

        player.update();

        // Manage projectiles
        projectiles.forEach((projectile, index) => {
            projectile.update();

            // Remove projectiles off screen
            if (projectile.x + projectile.radius < 0 || 
                projectile.x - projectile.radius > canvas.width || 
                projectile.y + projectile.radius < 0 || 
                projectile.y - projectile.radius > canvas.height) {
                setTimeout(() => { projectiles.splice(index, 1); }, 0);
            }
        });

        // Manage enemies
        enemies.forEach((enemy, enemyIndex) => {
            enemy.update();

            // Collision: Player and Enemy (Game Over)
            const dist = Math.hypot(player.x - enemy.x, player.y - enemy.y);
            if (dist - enemy.radius - player.radius < 1) {
                cancelAnimationFrame(animationId);
                isGameOver = true;
                gameOverScreen.style.display = 'block';
                finalScore.innerText = score;
            }

            // Collision: Projectile and Enemy
            projectiles.forEach((projectile, projectileIndex) => {
                const dist = Math.hypot(projectile.x - enemy.x, projectile.y - enemy.y);

                if (dist - enemy.radius - projectile.radius < 1) {
                    // Destroy enemy and projectile
                    setTimeout(() => {
                        enemies.splice(enemyIndex, 1);
                        projectiles.splice(projectileIndex, 1);
                        score += 100;
                        scoreText.innerText = score;
                    }, 0);
                }
            });
        });
    }

    // Start Game
    spawnEnemies();
    animate();

</script>
</body>
</html>
