<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Touch Air Hockey</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:#0b1b2b;
  font-family:sans-serif;
}

canvas{
  display:block;
  background:#0f2f44;
}

#score{
  position:absolute;
  top:10px;
  width:100%;
  text-align:center;
  color:white;
  font-size:28px;
  font-weight:bold;
}
</style>
</head>
<body>

<div id="score">0 : 0</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score1 = 0;
let score2 = 0;

let wallGlow = 0;

const puck = {
  x: canvas.width/2,
  y: canvas.height/2,
  vx: 4,
  vy: 4,
  r: 14
};

const paddle1 = {x: canvas.width/2, y: canvas.height-80, r:30};
const paddle2 = {x: canvas.width/2, y: 80, r:30};

function resetPuck(){
  puck.x = canvas.width/2;
  puck.y = canvas.height/2;
  puck.vx = (Math.random()>0.5?1:-1)*4;
  puck.vy = (Math.random()>0.5?1:-1)*4;
}

function drawCircle(x,y,r,color){
  ctx.fillStyle=color;
  ctx.beginPath();
  ctx.arc(x,y,r,0,Math.PI*2);
  ctx.fill();
}

function collide(paddle){
  let dx = puck.x - paddle.x;
  let dy = puck.y - paddle.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < puck.r + paddle.r){
    let angle = Math.atan2(dy,dx);
    let speed = 6;
    puck.vx = Math.cos(angle)*speed;
    puck.vy = Math.sin(angle)*speed;
  }
}

function update(){
  puck.x += puck.vx;
  puck.y += puck.vy;

  if(puck.x < puck.r || puck.x > canvas.width-puck.r){
    puck.vx *= -1;
    wallGlow = 15;
  }

  collide(paddle1);
  collide(paddle2);

  if(puck.y < 0){
    score1++;
    resetPuck();
  }

  if(puck.y > canvas.height){
    score2++;
    resetPuck();
  }

  if(wallGlow > 0) wallGlow--;

  document.getElementById("score").textContent =
    score1 + " : " + score2;
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle="white";
  ctx.lineWidth=4;

  ctx.beginPath();
  ctx.moveTo(0,canvas.height/2);
  ctx.lineTo(canvas.width,canvas.height/2);
  ctx.stroke();

  if(wallGlow>0){
    ctx.shadowColor="cyan";
    ctx.shadowBlur=30;
  }

  drawCircle(paddle1.x,paddle1.y,paddle1.r,"#4CAF50");
  drawCircle(paddle2.x,paddle2.y,paddle2.r,"#FF5252");

  ctx.shadowBlur=0;

  if(wallGlow>0){
    ctx.shadowColor="cyan";
    ctx.shadowBlur=40;
  }

  drawCircle(puck.x,puck.y,puck.r,"white");

  ctx.shadowBlur=0;
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

canvas.addEventListener("touchmove", e=>{
  for(let t of e.touches){
    let rect = canvas.getBoundingClientRect();
    let x = t.clientX - rect.left;
    let y = t.clientY - rect.top;

    if(y > canvas.height/2){
      paddle1.x = x;
      paddle1.y = y;
    } else {
      paddle2.x = x;
      paddle2.y = y;
    }
  }
});

loop();
</script>

</body>
</html>
