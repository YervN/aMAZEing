<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mega Labyrinth - Full Screen</title>
    <style>
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            width: 100vw;
        }
        #ui { 
            position: absolute; 
            top: 10px; 
            width: 100%; 
            display: flex; 
            justify-content: space-around; 
            z-index: 10; 
            pointer-events: none;
        }
        .score-card { 
            background: rgba(0,0,0,0.6); 
            padding: 8px 15px; 
            border-radius: 8px; 
            font-weight: bold;
            font-size: 14px;
            border: 1px solid #444;
        }
        canvas { 
            display: block;
        }

        /* ── D-Pad Controls ── */
        .game-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
        }
        .dpad {
            display: grid;
            grid-template-areas:
                '.  up  .'
                'lt ct rt'
                '.  dn  .';
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            gap: 4px;
            width: clamp(100px, 18vw, 160px);
            height: clamp(100px, 18vw, 160px);
            flex-shrink: 0;
            padding: 6px;
            user-select: none;
            -webkit-user-select: none;
        }
        .dpad-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            border: none;
            border-radius: 10px;
            font-size: clamp(18px, 3vw, 28px);
            font-weight: bold;
            cursor: pointer;
            touch-action: manipulation;
            transition: transform 0.08s, filter 0.08s;
        }
        .dpad-btn:active {
            transform: scale(0.88);
            filter: brightness(1.4);
        }
        .dpad-btn.up { grid-area: up; }
        .dpad-btn.dn { grid-area: dn; }
        .dpad-btn.lt { grid-area: lt; }
        .dpad-btn.rt { grid-area: rt; }

        /* P1 colours (pink) */
        .dpad.p1 .dpad-btn {
            background: rgba(255, 121, 198, 0.25);
            color: #ff79c6;
            border: 2px solid rgba(255, 121, 198, 0.5);
        }
        /* P2 colours (yellow) */
        .dpad.p2 .dpad-btn {
            background: rgba(241, 250, 140, 0.2);
            color: #f1fa8c;
            border: 2px solid rgba(241, 250, 140, 0.45);
        }

        .dpad-label {
            text-align: center;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 6px;
        }
        .dpad-col {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.9); 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 100; 
        }
        #overlay button { 
            padding: 20px 40px; 
            font-size: 24px; 
            background: #50fa7b; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            margin-top: 20px; 
            font-weight: bold;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="score-card" style="color:#ff79c6">🧱 WASD / Left-Tap</div>
    <div class="score-card" id="lvl-card">Level 1/5</div>
    <div class="score-card" style="color:#f1fa8c">🦋 Arrows / Right-Tap</div>
</div>

<div class="game-wrapper">
    <!-- P1 D-Pad (left side) -->
    <div class="dpad-col">
        <div class="dpad-label" style="color:#ff79c6">🧱 P1</div>
        <div class="dpad p1">
            <button class="dpad-btn up" data-p="p1" data-dx="0" data-dy="-1">▲</button>
            <button class="dpad-btn lt" data-p="p1" data-dx="-1" data-dy="0">◀</button>
            <button class="dpad-btn rt" data-p="p1" data-dx="1" data-dy="0">▶</button>
            <button class="dpad-btn dn" data-p="p1" data-dx="0" data-dy="1">▼</button>
        </div>
    </div>

    <canvas id="maze"></canvas>

    <!-- P2 D-Pad (right side) -->
    <div class="dpad-col">
        <div class="dpad-label" style="color:#f1fa8c">🦋 P2</div>
        <div class="dpad p2">
            <button class="dpad-btn up" data-p="p2" data-dx="0" data-dy="-1">▲</button>
            <button class="dpad-btn lt" data-p="p2" data-dx="-1" data-dy="0">◀</button>
            <button class="dpad-btn rt" data-p="p2" data-dx="1" data-dy="0">▶</button>
            <button class="dpad-btn dn" data-p="p2" data-dx="0" data-dy="1">▼</button>
        </div>
    </div>
</div>

<div id="overlay">
    <h1 id="status">WINS!</h1>
    <button onclick="startNextLevel()">NEXT CHALLENGE</button>
</div>

<script>
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

let level = 1;
let size, grid, cellSize;

const p1 = { x: 1, y: 1, icon: '🧱' };
const p2 = { x: 0, y: 0, icon: '🦋' };

function buildMaze(dim) {
    size = dim;
    grid = Array.from({ length: size }, () => Array(size).fill(0));

    function carve(cx, cy) {
        const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);
        grid[cy][cx] = 1;
        for (let [dx, dy] of dirs) {
            let nx = cx + dx * 2, ny = cy + dy * 2;
            if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && grid[ny][nx] === 0) {
                grid[cy + dy][cx + dx] = 1;
                carve(nx, ny);
            }
        }
    }

    carve(1, 1);

    // Symmetric Mirroring (180 degree rotation)
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            if (grid[y][x] === 1) grid[size - 1 - y][size - 1 - x] = 1;
        }
    }

    const mid = Math.floor(size / 2);
    grid[mid][mid] = 2; 
    // Ensure access to center
    grid[mid-1][mid] = 1; 
    grid[mid+1][mid] = 1;
    grid[mid][mid-1] = 1;
    grid[mid][mid+1] = 1;
}

function initGame() {
    // Bigger Maze Sizes: 25, 33, 41, 49, 57
    const mazeDim = 25 + (level - 1) * 8;
    buildMaze(mazeDim);
    
    p1.x = 1; p1.y = 1;
    p2.x = size - 2; p2.y = size - 2;

    // Zoom to screen size, leaving room for d-pads on sides
    const dpadWidth = Math.min(160, window.innerWidth * 0.18) + 12; // matches clamp + padding
    const availW = window.innerWidth - dpadWidth * 2;
    const availH = window.innerHeight;
    canvas.width = availW;
    canvas.height = availH;
    cellSize = Math.min(availW, availH) / size;

    document.getElementById("lvl-card").innerText = `Level ${level}/5`;
    document.getElementById("overlay").style.display = "none";
}

function draw() {
    ctx.fillStyle = "#121212";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Center the maze on screen
    const offsetX = (canvas.width - (size * cellSize)) / 2;
    const offsetY = (canvas.height - (size * cellSize)) / 2;

    for(let y=0; y<size; y++){
        for(let x=0; x<size; x++){
            if(grid[y][x] === 0) {
                ctx.fillStyle = "#282a36"; 
                ctx.fillRect(offsetX + x*cellSize, offsetY + y*cellSize, cellSize + 1, cellSize + 1);
            } else if (grid[y][x] === 2) {
                ctx.fillStyle = "#f1fa8c"; 
                ctx.fillRect(offsetX + x*cellSize, offsetY + y*cellSize, cellSize, cellSize);
                ctx.font = `${cellSize*0.8}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText("🏆", offsetX + (x+0.5)*cellSize, offsetY + (y+0.75)*cellSize);
            }
        }
    }
    
    ctx.font = `${cellSize*0.9}px Arial`;
    ctx.textAlign = "center";
    ctx.fillText(p1.icon, offsetX + (p1.x+0.5)*cellSize, offsetY + (p1.y+0.85)*cellSize);
    ctx.fillText(p2.icon, offsetX + (p2.x+0.5)*cellSize, offsetY + (p2.y+0.85)*cellSize);
}

function move(playerID, dx, dy) {
    const char = (playerID === 'p1') ? p1 : p2;
    const nx = char.x + dx;
    const ny = char.y + dy;

    if(nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny][nx] !== 0) {
        char.x = nx;
        char.y = ny;
        if(grid[ny][nx] === 2) win(playerID);
    }
}

function win(id) {
    const winner = (id === 'p1') ? "LEGO BRICK" : "BUTTERFLY";
    document.getElementById("status").innerText = winner + " REACHED THE CENTER!";
    document.getElementById("overlay").style.display = "flex";
}

function startNextLevel() {
    if(level < 5) level++;
    else level = 1;
    initGame();
}

// Touch controls: Split screen into 8 zones (4 for P1, 4 for P2)
window.addEventListener("pointerdown", (e) => {
    // Ignore taps on D-pad buttons (handled separately)
    if (e.target.closest('.dpad')) return;

    const x = e.clientX;
    const y = e.clientY;
    const halfW = window.innerWidth / 2;
    const halfH = window.innerHeight / 2;

    if (x < halfW) {
        // P1 Area (Brick)
        const relX = x / halfW;
        const relY = y / window.innerHeight;
        if (relY < 0.25) move('p1', 0, -1);
        else if (relY > 0.75) move('p1', 0, 1);
        else if (relX < 0.5) move('p1', -1, 0);
        else move('p1', 1, 0);
    } else {
        // P2 Area (Butterfly)
        const relX = (x - halfW) / halfW;
        const relY = y / window.innerHeight;
        if (relY < 0.25) move('p2', 0, -1);
        else if (relY > 0.75) move('p2', 0, 1);
        else if (relX < 0.5) move('p2', -1, 0);
        else move('p2', 1, 0);
    }
});

window.addEventListener("keydown", (e) => {
    switch(e.key.toLowerCase()) {
        case 'w': move('p1', 0, -1); break;
        case 's': move('p1', 0, 1); break;
        case 'a': move('p1', -1, 0); break;
        case 'd': move('p1', 1, 0); break;
        case 'arrowup': move('p2', 0, -1); break;
        case 'arrowdown': move('p2', 0, 1); break;
        case 'arrowleft': move('p2', -1, 0); break;
        case 'arrowright': move('p2', 1, 0); break;
    }
});

window.addEventListener("resize", initGame);

// ── D-Pad button wiring ──
(function wireDpad() {
    let repeatTimer = null;
    function stopRepeat() { clearInterval(repeatTimer); repeatTimer = null; }

    document.querySelectorAll('.dpad-btn').forEach(btn => {
        function fire() {
            const p  = btn.dataset.p;
            const dx = parseInt(btn.dataset.dx, 10);
            const dy = parseInt(btn.dataset.dy, 10);
            move(p, dx, dy);
        }
        btn.addEventListener('pointerdown', (e) => {
            e.preventDefault();
            fire();
            stopRepeat();
            repeatTimer = setInterval(fire, 120);
        });
        btn.addEventListener('pointerup',     stopRepeat);
        btn.addEventListener('pointerleave',  stopRepeat);
        btn.addEventListener('pointercancel', stopRepeat);
    });
})();

function loop() {
    draw();
    requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
