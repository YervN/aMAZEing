<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Symmetrical Labyrinth</title>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; overflow: hidden; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        #ui { position: absolute; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 10; }
        .score-card { background: rgba(255,255,255,0.1); padding: 10px 20px; border-radius: 10px; border: 2px solid #444; }
        canvas { background: #000; border: 4px solid #333; box-shadow: 0 0 20px rgba(0,0,0,0.5); max-width: 90vw; max-height: 50vh; }
        
        .controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 20px; box-sizing: border-box; }
        .dpad { display: grid; grid-template-columns: repeat(3, 60px); grid-template-rows: repeat(3, 60px); gap: 5px; }
        .btn { background: #333; border: 2px solid #666; color: white; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 24px; user-select: none; }
        .btn:active { background: #555; }
        .up { grid-column: 2; } .left { grid-column: 1; grid-row: 2; } .down { grid-column: 2; grid-row: 2; } .right { grid-column: 3; grid-row: 2; }
        
        #p1-btns .btn { border-color: #ff79c6; }
        #p2-btns .btn { border-color: #f1fa8c; }
        
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        button { padding: 15px 30px; font-size: 20px; background: #50fa7b; border: none; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="ui">
    <div class="score-card" id="p1-label" style="color:#ff79c6">🦋 P1 (WASD)</div>
    <div class="score-card" id="lvl-card">Level 1/5</div>
    <div class="score-card" id="p2-label" style="color:#f1fa8c">🧱 P2 (Arrows)</div>
</div>

<canvas id="maze"></canvas>

<div id="overlay">
    <h1 id="status">PLAYER 1 WINS!</h1>
    <button onclick="startNextLevel()">NEXT LEVEL</button>
</div>

<div class="controls">
    <div class="dpad" id="p1-btns">
        <div class="btn up" onpointerdown="move('p1', 0, -1)">▲</div>
        <div class="btn left" onpointerdown="move('p1', -1, 0)">◀</div>
        <div class="btn down" onpointerdown="move('p1', 0, 1)">▼</div>
        <div class="btn right" onpointerdown="move('p1', 1, 0)">▶</div>
    </div>
    <div class="dpad" id="p2-btns">
        <div class="btn up" onpointerdown="move('p2', 0, -1)">▲</div>
        <div class="btn left" onpointerdown="move('p2', -1, 0)">◀</div>
        <div class="btn down" onpointerdown="move('p2', 0, 1)">▼</div>
        <div class="btn right" onpointerdown="move('p2', 1, 0)">▶</div>
    </div>
</div>

<script>
const canvas = document.getElementById("maze");
const ctx = canvas.getContext("2d");

let level = 1;
let size, grid, cellSize;
const p1 = { x: 1, y: 1, icon: '🦋' };
const p2 = { x: 0, y: 0, icon: '🧱' };

function buildMaze(dim) {
    size = dim;
    grid = Array.from({ length: size }, () => Array(size).fill(0));

    // Carve logic (Recursive Backtracker)
    function carve(cx, cy) {
        const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]].sort(() => Math.random() - 0.5);
        grid[cy][cx] = 1;

        for (let [dx, dy] of dirs) {
            let nx = cx + dx * 2, ny = cy + dy * 2;
            if (nx > 0 && nx < size - 1 && ny > 0 && ny < size - 1 && grid[ny][nx] === 0) {
                grid[cy + dy][cx + dx] = 1;
                carve(nx, ny);
            }
        }
    }

    carve(1, 1);

    // Diagonal Symmetry: Mirror P1's side to P2
    for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
            if (grid[y][x] === 1) {
                grid[size - 1 - y][size - 1 - x] = 1;
            }
        }
    }

    // Force Center Goal
    const mid = Math.floor(size / 2);
    grid[mid][mid] = 2; // Goal
    // Connect path to goal
    grid[mid-1][mid] = 1; 
    grid[mid+1][mid] = 1;
}

function initGame() {
    const mazeDim = 11 + (level * 4); // 15, 19, 23, 27, 31
    buildMaze(mazeDim);
    
    p1.x = 1; p1.y = 1;
    p2.x = size - 2; p2.y = size - 2;

    const screenSpace = Math.min(window.innerWidth * 0.9, window.innerHeight * 0.5);
    canvas.width = screenSpace;
    canvas.height = screenSpace;
    cellSize = canvas.width / size;

    document.getElementById("lvl-card").innerText = `Level ${level}/5`;
    document.getElementById("overlay").style.display = "none";
}

function draw() {
    ctx.clearRect(0,0, canvas.width, canvas.height);
    
    for(let y=0; y<size; y++){
        for(let x=0; x<size; x++){
            if(grid[y][x] === 0) {
                ctx.fillStyle = "#282a36"; // Wall
                ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
            } else if (grid[y][x] === 2) {
                ctx.fillStyle = "#f1fa8c"; // Goal
                ctx.fillRect(x*cellSize, y*cellSize, cellSize, cellSize);
                ctx.font = `${cellSize*0.7}px Arial`;
                ctx.textAlign = "center";
                ctx.fillText("🏆", (x+0.5)*cellSize, (y+0.65)*cellSize);
            }
        }
    }

    // Draw Icons
    ctx.font = `${cellSize*0.8}px Arial`;
    ctx.textAlign = "center";
    ctx.fillText(p1.icon, (p1.x+0.5)*cellSize, (p1.y+0.8)*cellSize);
    ctx.fillText(p2.icon, (p2.x+0.5)*cellSize, (p2.y+0.8)*cellSize);
}

function move(playerID, dx, dy) {
    const char = (playerID === 'p1') ? p1 : p2;
    const nx = char.x + dx;
    const ny = char.y + dy;

    if(nx >= 0 && nx < size && ny >= 0 && ny < size && grid[ny][nx] !== 0) {
        char.x = nx;
        char.y = ny;
        if(grid[ny][nx] === 2) win(playerID);
    }
}

function win(id) {
    const winner = (id === 'p1') ? "BUTTERFLY" : "LEGO BRICK";
    document.getElementById("status").innerText = winner + " WINS!";
    document.getElementById("overlay").style.display = "flex";
}

function startNextLevel() {
    if(level < 5) level++;
    else level = 1;
    initGame();
}

// Keyboard Listeners
window.addEventListener("keydown", (e) => {
    switch(e.key.toLowerCase()) {
        case 'w': move('p1', 0, -1); break;
        case 's': move('p1', 0, 1); break;
        case 'a': move('p1', -1, 0); break;
        case 'd': move('p1', 1, 0); break;
        case 'arrowup': move('p2', 0, -1); break;
        case 'arrowdown': move('p2', 0, 1); break;
        case 'arrowleft': move('p2', -1, 0); break;
        case 'arrowright': move('p2', 1, 0); break;
    }
});

function loop() {
    draw();
    requestAnimationFrame(loop);
}

initGame();
loop();
</script>
</body>
</html>
