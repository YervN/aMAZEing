<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celebrity Tongue Tanks '85</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        body {
            margin: 0;
            background: #222;
            color: white;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
        }

        canvas {
            background: #000;
            border: 4px solid #777;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
            image-rendering: pixelated; /* Retro crispness */
        }

        #ui {
            display: flex;
            justify-content: space-between;
            width: 640px;
            margin-bottom: 10px;
            text-shadow: 2px 2px 0 #000;
        }

        .p1-text { color: #ff00ff; }
        .p2-text { color: #00ffff; }
        .enemy-text { color: #ff4444; }

        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        h1 { font-size: 24px; text-align: center; line-height: 1.5; color: #ffeb3b; }
        p { font-size: 12px; text-align: center; line-height: 2; color: #ddd; }
        button {
            margin-top: 20px;
            padding: 15px 20px;
            font-family: inherit;
            background: #e52521;
            color: white;
            border: 4px solid #fff;
            cursor: pointer;
        }
        button:hover { background: #fff; color: #e52521; }
    </style>
</head>
<body>

<div id="ui">
    <div class="p1-text">P1 (Miley): <span id="p1-score">0</span></div>
    <div>LEVEL: <span id="level-display">1</span></div>
    <div class="p2-text">P2 (Gene): <span id="p2-score">0</span></div>
</div>

<div id="game-container">
    <canvas id="gameCanvas" width="640" height="640"></canvas>
    <div id="overlay">
        <h1 id="title">CELEBRITY<br>TONGUE TANKS</h1>
        <p>
            <span class="p1-text">P1: WASD to Move, SPACE to Spit</span><br>
            <span class="p2-text">P2: ARROWS to Move, ENTER to Spit</span><br><br>
            Destroy the Paparazzi (📸)<br>Break Bricks, Avoid Steel.
        </p>
        <button id="start-btn">START STAGE 1</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

// Game Constants
const TILE_SIZE = 40;
const ROWS = 16;
const COLS = 16;
let level = 1;
let p1Score = 0;
let p2Score = 0;
let gameState = "START"; // START, PLAYING, GAME_OVER, LEVEL_CLEAR

// Maps (0: empty, 1: brick, 2: steel)
const maps = [
    // Level 1
    [
        "0000000000000000",
        "0110110000110110",
        "0110110220110110",
        "0110110220110110",
        "0110110110110110",
        "0000000110000000",
        "0110222222220110",
        "0110000000000110",
        "0110111001110110",
        "0000101001010000",
        "1110101001010111",
        "0000000000000000",
        "0111110110111110",
        "0000000110000000",
        "0000000000000000",
        "0000000000000000"
    ],
    // Level 2
    [
        "0000000000000000",
        "0222011111102220",
        "0200000000000020",
        "0201111221111020",
        "0001000000001000",
        "1101022222201011",
        "0000020000200000",
        "2222020110202222",
        "0000020110200000",
        "1101022222201011",
        "0001000000001000",
        "0201111221111020",
        "0200000000000020",
        "0222011111102220",
        "0000000000000000",
        "0000000000000000"
    ]
];

let grid = [];
let entities = [];
let bullets = [];

const keys = {};

// Listeners
window.addEventListener("keydown", e => { keys[e.code] = true; if(["Space","ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Enter"].includes(e.code)) e.preventDefault(); });
window.addEventListener("keyup", e => keys[e.code] = false);

class Tank {
    constructor(x, y, color, icon, isPlayer, id) {
        this.x = x;
        this.y = y;
        this.w = 32;
        this.h = 32;
        this.color = color;
        this.icon = icon;
        this.isPlayer = isPlayer;
        this.id = id;
        this.speed = isPlayer ? 3 : 1.5;
        this.dir = {x: 0, y: -1}; // Facing up
        this.cooldown = 0;
        
        // AI stuff
        this.aiTimer = 0;
    }

    update() {
        if (this.cooldown > 0) this.cooldown--;

        let dx = 0; let dy = 0;

        if (this.isPlayer) {
            if (this.id === 1) { // WASD
                if (keys["KeyW"]) { dy = -1; this.dir = {x:0, y:-1}; }
                else if (keys["KeyS"]) { dy = 1; this.dir = {x:0, y:1}; }
                else if (keys["KeyA"]) { dx = -1; this.dir = {x:-1, y:0}; }
                else if (keys["KeyD"]) { dx = 1; this.dir = {x:1, y:0}; }
                if (keys["Space"] && this.cooldown === 0) this.shoot();
            } else { // Arrows
                if (keys["ArrowUp"]) { dy = -1; this.dir = {x:0, y:-1}; }
                else if (keys["ArrowDown"]) { dy = 1; this.dir = {x:0, y:1}; }
                else if (keys["ArrowLeft"]) { dx = -1; this.dir = {x:-1, y:0}; }
                else if (keys["ArrowRight"]) { dx = 1; this.dir = {x:1, y:0}; }
                if (keys["Enter"] && this.cooldown === 0) this.shoot();
            }
        } else {
            // Simple Enemy AI
            this.aiTimer--;
            if (this.aiTimer <= 0) {
                const dirs = [{x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0}];
                this.dir = dirs[Math.floor(Math.random() * dirs.length)];
                this.aiTimer = 30 + Math.random() * 60;
            }
            dx = this.dir.x;
            dy = this.dir.y;
            
            if (Math.random() < 0.02 && this.cooldown === 0) this.shoot();
        }

        // Try moving X
        this.x += dx * this.speed;
        if (this.checkCollision()) {
            this.x -= dx * this.speed;
            if(!this.isPlayer) this.aiTimer = 0; // Force turn
        }

        // Try moving Y
        this.y += dy * this.speed;
        if (this.checkCollision()) {
            this.y -= dy * this.speed;
            if(!this.isPlayer) this.aiTimer = 0; // Force turn
        }
        
        // Clamp to screen
        this.x = Math.max(0, Math.min(this.x, canvas.width - this.w));
        this.y = Math.max(0, Math.min(this.y, canvas.height - this.h));
    }

    checkCollision() {
        // Wall collisions
        for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
                if (grid[r][c] > 0) {
                    let wx = c * TILE_SIZE;
                    let wy = r * TILE_SIZE;
                    if (this.x < wx + TILE_SIZE && this.x + this.w > wx &&
                        this.y < wy + TILE_SIZE && this.y + this.h > wy) {
                        return true;
                    }
                }
            }
        }
        return false;
    }

    shoot() {
        this.cooldown = this.isPlayer ? 25 : 60;
        
        let bx = this.x + this.w/2 - 8;
        let by = this.y + this.h/2 - 8;
        
        // Offset bullet to tip of tongue
        bx += this.dir.x * 20;
        by += this.dir.y * 20;

        bullets.push({
            x: bx, y: by, 
            w: 16, h: 16,
            dx: this.dir.x * 8, dy: this.dir.y * 8,
            owner: this,
            isPlayer: this.isPlayer
        });
    }

    draw() {
        // Tank Base
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
        
        // The "Tongue" Gun Barrel
        ctx.fillStyle = "#ff66b2"; // Pink tongue color
        let tx = this.x + this.w/2 - 4;
        let ty = this.y + this.h/2 - 4;
        let tw = 8; let th = 8;
        
        if (this.dir.y === -1) { ty -= 16; th = 20; }
        else if (this.dir.y === 1) { th = 20; }
        else if (this.dir.x === -1) { tx -= 16; tw = 20; }
        else if (this.dir.x === 1) { tw = 20; }
        
        ctx.fillRect(tx, ty, tw, th);
        
        // Draw the tongue line
        ctx.fillStyle = "#cc0052";
        if(this.dir.y !== 0) ctx.fillRect(tx + 3, ty, 2, th);
        if(this.dir.x !== 0) ctx.fillRect(tx, ty + 3, tw, 2);

        // Icon (Face)
        ctx.font = "20px Arial";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(this.icon, this.x + this.w/2, this.y + this.h/2);
    }
}

function loadLevel(lvlIndex) {
    const mapStr = maps[(lvlIndex - 1) % maps.length]; // Loop maps if we run out
    grid = [];
    for (let r = 0; r < ROWS; r++) {
        let row = [];
        for (let c = 0; c < COLS; c++) {
            row.push(parseInt(mapStr[r][c]));
        }
        grid.push(row);
    }

    entities = [];
    bullets = [];
    
    // Players (bottom centerish)
    entities.push(new Tank(4 * TILE_SIZE + 4, 14 * TILE_SIZE + 4, "#ff00ff", "👱‍♀️", true, 1));
    entities.push(new Tank(11 * TILE_SIZE + 4, 14 * TILE_SIZE + 4, "#00ffff", "🎸", true, 2));

    // Enemies (Top area)
    const enemyCount = 4 + level * 2;
    for(let i=0; i<enemyCount; i++) {
        let spawnX = (i % 3) * 6 * TILE_SIZE + 4;
        entities.push(new Tank(spawnX, 4, "#555", "📸", false, 0));
    }

    document.getElementById("level-display").innerText = level;
    gameState = "PLAYING";
    document.getElementById("overlay").style.display = "none";
}

function update() {
    if (gameState !== "PLAYING") return;

    // Update Entities
    entities.forEach(e => e.update());

    // Update Bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.dx;
        b.y += b.
